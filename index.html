<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>
    <h2>Login</h2>

    <form>
        Username: <input type="text" id="username"><br><br>
        Password: <input type="password" id="password"><br><br>
        <button type="button" onclick="login()">Login</button>
    </form>

    <div id="message"></div>

    <hr>

    <h2>Leave a Comment</h2>

    <form>
        <input type="text" id="comment">
        <button type="button" onclick="addComment()">Submit</button>
    </form>

    <div id="comments"></div>

    <script>
function login() {
    var username = document.getElementById("username").value;
    var password = document.getElementById("password").value;

    if (username === "admin" && password === "password") {
        document.getElementById("message").innerHTML = "<p style='color:green;'>Login successful! Welcome " + username + "</p>";
    } else {
        document.getElementById("message").innerHTML = "<p style='color:red;'>Invalid username or password</p>";
    }
}

function addComment() {
    var comment = document.getElementById("comment").value;
    document.getElementById("comments").innerHTML += comment + "<br>";
}
    </script>

</body>
</html>
